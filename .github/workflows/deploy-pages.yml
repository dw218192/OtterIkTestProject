# Deploy Unity WebGL build to GitHub Pages
#
# Prerequisites:
#   1. Enable GitHub Pages in repo Settings > Pages > Source: "GitHub Actions"
#   2. Add UNITY_LICENSE secret (see activation instructions at bottom of file)
#
# ─── Unity License Activation ───────────────────────────────────────────────────
# To obtain the Unity license file for CI:
#
#   1. Create a temporary workflow or run locally:
#
#        # Uncomment and use the activate-unity-license job below, or run:
#        # npx game-ci/unity-activate -u <email> -p <password> -k <serial>
#
#   2. Alternatively, use the game-ci/unity-request-activation-file action:
#
#        # jobs:
#        #   request-activation:
#        #     runs-on: ubuntu-latest
#        #     steps:
#        #       - uses: game-ci/unity-request-activation-file@v2
#        #         id: getManualLicenseFile
#        #         with:
#        #           unityVersion: 2022.3.9f1
#        #       - uses: actions/upload-artifact@v4
#        #         with:
#        #           name: Unity_v2022.3.9f1.alf
#        #           path: ${{ steps.getManualLicenseFile.outputs.filePath }}
#
#   3. Download the .alf artifact, upload it at https://license.unity3d.com/manual
#   4. Download the resulting .ulf file
#   5. Add its contents as the UNITY_LICENSE repository secret
# ─────────────────────────────────────────────────────────────────────────────────

name: Deploy WebGL to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build WebGL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-WebGL-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-WebGL-
            Library-

      - name: Build WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          unityVersion: 2022.3.9f1
          targetPlatform: WebGL
          buildMethod: WebGLBuilder.Build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Builds/WebGL

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
