repo:
  features: []
  tokens:
    build_root: Builds
    webgl_build_dir: "{build_root}/WebGL"

build:
  steps:
    - command: >-
        "{unity_editor}" -quit -batchmode
        -projectPath "{workspace_root}"
        -buildTarget WebGL
        -executeMethod WebGLBuilder.Build
        -logFile -

clean:
  paths:
    - "{build_root}"
